# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

# Check for known vulnerabilities in dependencies
[advisories]
ignore = [
    # GTK3 bindings are unmaintained, but Tauri uses them on Linux — no fix available.
    { id = "RUSTSEC-2024-0413", reason = "Tauri transitive dep (atk)" },
    { id = "RUSTSEC-2024-0414", reason = "Tauri transitive dep (gdkx11-sys)" },
    { id = "RUSTSEC-2024-0415", reason = "Tauri transitive dep (gtk)" },
    { id = "RUSTSEC-2024-0416", reason = "Tauri transitive dep (atk-sys)" },
    { id = "RUSTSEC-2024-0417", reason = "Tauri transitive dep (gdk)" },
    { id = "RUSTSEC-2024-0418", reason = "Tauri transitive dep (gdk-sys)" },
    { id = "RUSTSEC-2024-0419", reason = "Tauri transitive dep (gdkx11)" },
    { id = "RUSTSEC-2024-0420", reason = "Tauri transitive dep (gtk-sys)" },
    { id = "RUSTSEC-2024-0411", reason = "Tauri transitive dep (gdkwayland-sys)" },
    { id = "RUSTSEC-2024-0412", reason = "Tauri transitive dep (gdk)" },
    { id = "RUSTSEC-2025-0057", reason = "Tauri transitive dep (fxhash via selectors)" },
    { id = "RUSTSEC-2025-0080", reason = "Tauri transitive dep (unic-common)" },
    { id = "RUSTSEC-2025-0098", reason = "Tauri transitive dep (unic-ucd-version)" },
    { id = "RUSTSEC-2025-0100", reason = "Tauri transitive dep (unic-ucd-ident)" },
    # proc-macro-error unmaintained — used by glib-macros/gtk3-macros (Tauri transitive)
    { id = "RUSTSEC-2024-0370", reason = "Tauri transitive dep (proc-macro-error via glib-macros)" },
    { id = "RUSTSEC-2025-0075", reason = "Tauri transitive dep (unic-char-range)" },
    { id = "RUSTSEC-2025-0081", reason = "Tauri transitive dep (unic-char-property)" },
]

# Check dependency licenses
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

# Ban duplicate crate versions and specific crates
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# Only allow crates.io dependencies
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
