name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kde:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 dependencies (for QML tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-declarative-dev qt6-base-dev qml6-module-qttest qml6-module-qtquick-layouts qml6-module-qtquick-controls qml6-module-qtqml-workerscript libkirigami-dev

      - name: Run QML plasmoid tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: make test-plasmoid
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Lint
        run: make lint

      - name: Run Rust tests
        run: make test

      - name: Build check
        run: cargo build --workspace
