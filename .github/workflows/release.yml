name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Qt6 dependencies (for QML tests)
        run: |
          sudo apt-get install -y qt6-declarative-dev qt6-base-dev qml6-module-qttest qml6-module-qtquick-layouts qml6-module-qtquick-controls

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run QML plasmoid tests
        run: |
          QMLTESTRUNNER=$(find /usr/lib/qt6 -name qmltestrunner -type f 2>/dev/null | head -1)
          if [ -z "$QMLTESTRUNNER" ]; then
            QMLTESTRUNNER=$(which qmltestrunner 2>/dev/null || true)
          fi
          if [ -z "$QMLTESTRUNNER" ]; then
            echo "WARNING: qmltestrunner not found, skipping QML tests"
            exit 0
          fi
          QT_QPA_PLATFORM=offscreen "$QMLTESTRUNNER" -input crates/twitch-kde/plasmoid/contents/tests -import crates/twitch-kde/plasmoid/contents

  release:
    needs: check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - platform: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cd crates/twitch-app-tauri && cargo tauri build --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/twitch-tray dist/twitch-tray-${{ matrix.suffix }}

      - name: Prepare artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/twitch-tray dist/twitch-tray-${{ matrix.suffix }}

      - name: Prepare artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/twitch-tray.exe dist/twitch-tray-${{ matrix.suffix }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twitch-tray-${{ matrix.suffix }}
          path: dist/*

  release-kde:
    needs: check
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build KDE daemon
        run: cargo build --release -p twitch-kde

      - name: Package KDE plasmoid
        run: |
          mkdir -p dist/twitch-kde-plasmoid/contents/ui
          cp crates/twitch-kde/plasmoid/metadata.json dist/twitch-kde-plasmoid/
          cp crates/twitch-kde/plasmoid/contents/ui/*.qml dist/twitch-kde-plasmoid/contents/ui/
          cp target/release/twitch-kde dist/twitch-kde-linux-amd64
          cd dist && tar czf twitch-kde-linux-amd64.tar.gz twitch-kde-linux-amd64 twitch-kde-plasmoid/

      - name: Upload KDE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twitch-kde-linux-amd64
          path: dist/twitch-kde-linux-amd64.tar.gz

  create-release:
    needs: [release, release-kde]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
